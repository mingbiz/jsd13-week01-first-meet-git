<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ครัวบ้านสวน - เมนูอาหาร</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Sarabun', sans-serif;
      background: #fdf8f3;
      color: #2d2d2d;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ===== Header ===== */
    header {
      background: linear-gradient(135deg, #d35400, #e67e22);
      color: #fff;
      padding: 24px 0;
      box-shadow: 0 4px 20px rgba(211, 84, 0, 0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .brand h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .brand small {
      display: block;
      font-size: 13px;
      opacity: 0.85;
      font-weight: 300;
    }

    /* ===== Cart Badge ===== */
    .cart-wrapper {
      position: relative;
    }

    .cart-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.5);
      color: #fff;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.3s;
    }

    .cart-btn:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    #cart-count {
      background: #e74c3c;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      min-width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      border-radius: 50px;
      padding: 0 6px;
      display: inline-block;
    }

    /* ===== Hero ===== */
    .hero {
      text-align: center;
      padding: 48px 0 24px;
    }

    .hero h2 {
      font-size: 32px;
      color: #d35400;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 18px;
      color: #777;
    }

    /* ===== Menu Grid ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
      padding-bottom: 60px;
    }

    .menu-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.07);
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
    }

    .menu-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
    }

    .menu-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .menu-card-body {
      padding: 20px 22px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .menu-card-body h3 {
      font-size: 20px;
      color: #2c3e50;
      margin-bottom: 6px;
    }

    .menu-card-body .desc {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
      flex: 1;
    }

    .menu-card-body .price {
      font-size: 22px;
      font-weight: 700;
      color: #d35400;
      margin-bottom: 16px;
    }

    .menu-card-body .price span {
      font-size: 16px;
      font-weight: 400;
    }

    .order-btn {
      background: linear-gradient(135deg, #d35400, #e67e22);
      color: #fff;
      border: none;
      padding: 12px 0;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
      width: 100%;
    }

    .order-btn:hover {
      opacity: 0.9;
    }

    .order-btn:active {
      transform: scale(0.97);
    }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      padding: 28px 0;
      color: #aaa;
      font-size: 14px;
      border-top: 1px solid #eee;
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      header .container {
        flex-direction: column;
        text-align: center;
      }
      .brand {
        flex-direction: column;
      }
      .menu-grid {
        grid-template-columns: 1fr;
      }
      .hero h2 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <div class="container">
      <div class="brand">
        <div class="brand-icon">🍜</div>
        <div>
          <h1>ครัวบ้านสวน</h1>
          <small>อาหารไทยแท้ สูตรคุณยาย</small>
        </div>
      </div>
      <div class="cart-wrapper">
        <button class="cart-btn" onclick="showCartSummary()">
          🛒 ตะกร้า <span id="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== Hero ===== -->
  <section class="hero">
    <div class="container">
      <h2>เมนูแนะนำประจำร้าน</h2>
      <p>วัตถุดิบสดใหม่ ปรุงด้วยความใส่ใจ ส่งตรงถึงบ้านคุณ</p>
    </div>
  </section>

  <!-- ===== Menu Grid ===== -->
  <section class="container">
    <div class="menu-grid" id="menu-grid">
      <!-- Cards will be rendered by JS -->
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer>
    <div class="container">
      &copy; 2026 ครัวบ้านสวน — รสชาติที่คุณไว้ใจ
    </div>
  </footer>

  <script>
    // ===== Menu Data =====
    const menuItems = [
      {
        id: 1,
        name: 'ผัดไทยกุ้งสด',
        desc: 'เส้นจันท์เหนียวนุ่ม คลุกเคล้ากับซอสผัดไทยสูตรดั้งเดิม โรยด้วยกุ้งแม่น้ำตัวโต ถั่วงอกสด และถั่วลิสงคั่ว',
        price: 89,
        img: 'https://images.unsplash.com/photo-1559314809-0d155014e29e?w=600&q=80'
      },
      {
        id: 2,
        name: 'ต้มยำกุ้งน้ำข้น',
        desc: 'ต้มยำกุ้งน้ำข้นเข้มข้น ใส่เห็ดฟาง มะเขือเทศ ตะไคร้ ใบมะกรูด พร้อมกุ้งสดแน่น ๆ',
        price: 129,
        img: 'https://images.unsplash.com/photo-1548943487-a2e4e43b4853?w=600&q=80'
      },
      {
        id: 3,
        name: 'ข้าวผัดกระเพราหมูกรอบ',
        desc: 'ข้าวผัดกระเพราใบสด หอมกลิ่นกระเทียม พริกไทย  topped ด้วยหมูกรอบชิ้นโต ไข่ดาวเยิ้ม ๆ',
        price: 75,
        img: 'https://images.unsplash.com/photo-1562565652-a0d8f0c59eb4?w=600&q=80'
      },
      {
        id: 4,
        name: 'ส้มตำไทยปูปลาร้า',
        desc: 'ส้มตำไทยรสแซ่บ มะละกอสด กรุบกรอบ คลุกเคล้ากับปูเค็ม ปลาร้าสับ และมะเขือเทศ',
        price: 65,
        img: 'https://images.unsplash.com/photo-1621852007116-cba4cb4efd2b?w=600&q=80'
      }
    ];

    let cart = [];

    // ===== Render Menu =====
    function renderMenu() {
      const grid = document.getElementById('menu-grid');
      grid.innerHTML = menuItems.map(item => `
        <div class="menu-card">
          <img src="${item.img}" alt="${item.name}" loading="lazy">
          <div class="menu-card-body">
            <h3>${item.name}</h3>
            <p class="desc">${item.desc}</p>
            <p class="price"><span>฿</span> ${item.price}</p>
            <button class="order-btn" onclick="orderItem(${item.id})">
              🛵 สั่งจอง
            </button>
          </div>
        </div>
      `).join('');
    }

    // ===== Order Function =====
    function orderItem(id) {
      const item = menuItems.find(m => m.id === id);
      if (!item) return;

      cart.push(item);
      updateCartCount();

      alert(`✅ คุณได้สั่งจอง "${item.name}" เรียบร้อยแล้ว!`);
    }

    // ===== Update Cart Count =====
    function updateCartCount() {
      document.getElementById('cart-count').textContent = cart.length;
    }

    // ===== Show Cart Summary =====
    function showCartSummary() {
      if (cart.length === 0) {
        alert('🛒 ตะกร้าของคุณยังว่างอยู่เลย ลองสั่งอะไรสักหน่อยสิคะ!');
        return;
      }

      const total = cart.reduce((sum, item) => sum + item.price, 0);
      let msg = '📋 รายการที่สั่งจอง:\n';
      msg += '─'.repeat(28) + '\n';
      const counts = {};
      cart.forEach(item => {
        counts[item.name] = (counts[item.name] || 0) + 1;
      });
      Object.entries(counts).forEach(([name, count]) => {
        msg += `  ${count > 1 ? count + 'x ' : ''}${name}\n`;
      });
      msg += '─'.repeat(28) + '\n';
      msg += `💰 รวมทั้งหมด: ฿ ${total.toLocaleString()}`;
      alert(msg);
    }

    // ===== Init =====
    renderMenu();
  </script>
</body>
</html>
